name: true-love-base Deploy to m8s-win

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
    paths:
      - "true-love-base/**"
      - ".github/workflows/true-love-base.yml"

env:
  SERVER_IP: ${{ secrets.M8S_GW_HOST }}
  SERVER_PORT: 2233
  SERVER_USER: admin
  SERVER_SSH_KEY: ${{ secrets.M8S_SSH_DOOR_KEY }}

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy Base
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Delay
        run: sleep 30

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ env.SERVER_SSH_KEY }}

      - name: Execute base Commands Over SSH (Windows)
        shell: bash
        run: |
          set -euo pipefail
          echo "SSH env ready"
          ssh -o StrictHostKeyChecking=no -p ${{ env.SERVER_PORT }} ${{ env.SERVER_USER }}@${{ env.SERVER_IP }} << 'EOF'
            $ErrorActionPreference = "Stop"
            $taskName = "UIA-TL-BASE"

            Write-Host "Connected to remote server"

            Write-Host "Stopping existing TrueLove-Base task if it is running"
            schtasks /end /tn $taskName
            if ($LASTEXITCODE -ne 0) {
              Write-Host "Task was not running or could not be stopped; continuing"
            }

            Write-Host "Starting TrueLove-Base task"
            schtasks /run /tn $taskName
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

            Write-Host "Checking TrueLove-Base task status"
            schtasks /query /tn $taskName
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

            Write-Host "Deployment script completed"
          EOF

      - name: Notify - base Success
        if: success()
        run: |
          curl --location ${{ secrets.TL_NOTIFY_PATH }} \
          --header 'Content-Type: application/json' \
          --data '{
            "token": "${{ secrets.TL_NOTIFY_TOKEN }}",
            "sendReceiver": "master",
            "atReceiver": "",
            "content": "真爱粉 base 模块已经成功启动"
          }' || echo "通知发送失败，但部署成功"


## 创建任务
## .\create-uia-base.ps1
#
## 启动任务
## schtasks /run /tn "UIA-TL-BASE"
#
## 停止任务
## schtasks /end /tn "UIA-TL-BASE"
#
## 重启
## schtasks /end /tn "UIA-TL-BASE"; schtasks /run /tn "UIA-TL-BASE"
#
## 查看任务状态
## Get-ScheduledTask -TaskName "UIA-TL-BASE"
#
## 删除任务（方便重新创建）
## Unregister-ScheduledTask -TaskName "UIA-TL-BASE" -Confirm:$false
